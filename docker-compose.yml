version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - claude-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/claude_dashboard?sslmode=disable
      - CORS_ORIGINS=http://localhost:3000
      - CLAUDE_HOME=/root/.claude
      - JWT_SECRET=${JWT_SECRET:-claude-dashboard-secret}
      - ENVIRONMENT=production
    volumes:
      - ~/.claude:/root/.claude:ro
    networks:
      - claude-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=claude_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - claude-net

volumes:
  pgdata:

networks:
  claude-net:
    driver: bridge
